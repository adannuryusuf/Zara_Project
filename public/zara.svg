<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg   { fill: #FAF6EE; }
    .leaf { fill: #2D6A4F; }
    .vein { fill: none; stroke: rgba(250,246,238,0.55); stroke-linecap: round; }
    .stem { stroke: #2D6A4F; fill: none; stroke-linecap: round; }
    .dot  { fill: #C8A870; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #1e4d38; }
      .leaf { fill: #FAF6EE; }
      .vein { stroke: rgba(30,77,56,0.38); }
      .stem { stroke: #FAF6EE; }
    }
  </style>

  <rect class="bg" width="32" height="32" rx="7"/>

  <path class="leaf"
    d="M 16,3 C 22,9 22,21 16,27 C 10,21 10,9 16,3 Z"/>

  <path class="vein" stroke-width="0.55"
    d="M 16,4 L 16,26
       M 16,8  Q 14,10 12,10   M 16,8  Q 18,10 20,10
       M 16,14 Q 13,16 11,16   M 16,14 Q 19,16 21,16
       M 16,20 Q 14,22 12,22   M 16,20 Q 18,22 20,22"/>

  <line class="stem" x1="16" y1="27" x2="16" y2="29" stroke-width="0.9"/>
  <circle class="dot" cx="16" cy="30" r="1.3"/>
</svg>
